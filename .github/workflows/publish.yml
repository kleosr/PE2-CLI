# Runs on push of a version tag (v*).
# Repo → Settings → Secrets → Actions: add NPM_TOKEN (npm granular token, read/write on
# @kleosr/pe2-cli; enable Bypass 2FA on the token if npm asks for 2FA on publish).
# https://docs.npmjs.com/creating-and-viewing-access-tokens
name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
