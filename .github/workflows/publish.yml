# Publica en npm con OIDC (Trusted Publishing). Sin token ni --otp.
# Requisito en npmjs.com: paquete → Settings → Trusted publishing → GitHub Actions
#   Repo: kleosr/PE2-CLI  |  Workflow: publish.yml  (exacto, con extensión)
# Docs: https://docs.npmjs.com/trusted-publishers
name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      - name: Use npm CLI with trusted publishing support
        run: npm install -g npm@^11.5.1

      - run: npm ci

      - run: npm test

      - run: npm publish
